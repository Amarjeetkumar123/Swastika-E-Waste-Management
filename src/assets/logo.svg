<svg viewBox="0 0 280 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#84cc16;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Circular background with accent -->
  <circle cx="35" cy="50" r="32" fill="url(#brandGradient)" opacity="0.1"/>
  <circle cx="35" cy="50" r="30" fill="none" stroke="url(#accentGradient)" stroke-width="2"/>
  
  <!-- Recycling symbol in circle -->
  <g transform="translate(35, 50)">
    <!-- Three curved arrows forming recycling symbol -->
    <path d="M 0,-18 A 18,18 0 0,1 15.6,9 L 12,12 A 12,12 0 0,0 0,-12 Z" fill="url(#accentGradient)" opacity="0.8"/>
    <path d="M -15.6,-9 A 18,18 0 0,1 0,18 L 0,12 A 12,12 0 0,0 -10.4,-6 Z" fill="#84cc16" opacity="0.6"/>
    <path d="M 15.6,9 A 18,18 0 0,1 -15.6,-9 L -10.4,-6 A 12,12 0 0,0 10.4,6 Z" fill="#22c55e" opacity="0.7"/>
  </g>
  
  <!-- Brand name text -->
  <text x="75" y="55" font-family="'Space Grotesk', sans-serif" font-size="36" font-weight="700" fill="#0f172a" letter-spacing="2">SWASTIKA</text>
  
  <!-- Tagline -->
  <text x="75" y="72" font-family="'Manrope', sans-serif" font-size="11" font-weight="500" fill="#64748b" letter-spacing="1">E-WASTE MANAGEMENT</text>
  
  <!-- Accent line -->
  <line x1="75" y1="78" x2="270" y2="78" stroke="url(#accentGradient)" stroke-width="2"/>
</svg>